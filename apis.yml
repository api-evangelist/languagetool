aid: languagetool
name: LanguageTool
description: >-
  LanguageTool is an open-source proofreading and grammar checking tool that
  supports more than 25 languages. The HTTP API enables developers to
  programmatically check texts for grammar and style issues, list supported
  languages, and manage personal dictionaries.
type: Index
position: Consumer

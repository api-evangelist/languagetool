apis:
  - aid: languagetool:languagetool
    name: LanguageTool HTTP API
    description: >-
      The LanguageTool HTTP API provides programmatic access to grammar and
      style checking. The /check endpoint analyzes a text in a given language
      and returns matches with messages, replacements, and rule context. The
      /languages endpoint lists all supported languages, and the /words
      endpoints manage entries in a user's personal dictionaries.
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg

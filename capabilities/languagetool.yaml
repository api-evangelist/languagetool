naftiko: 1.0.0-alpha2
info:
  label: LanguageTool HTTP API
  description: 'LanguageTool HTTP API. 5 operations. Lead operation: Check text for grammar and style issues. Self-contained
    Naftiko capability covering one Languagetool business surface.'
  tags:
  - Languagetool
  - LanguageTool HTTP API
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    LANGUAGETOOL_API_KEY: LANGUAGETOOL_API_KEY
capability:
  consumes:
  - type: http
    namespace: languagetool
    baseUri: https://api.languagetool.org/v2
    description: LanguageTool HTTP API business capability. Self-contained, no shared references.
    resources:
    - name: check
      path: /check
      operations:
      - name: checktext
        method: POST
        description: Check text for grammar and style issues
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: languages
      path: /languages
      operations:
      - name: listlanguages
        method: GET
        description: List supported languages
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: words
      path: /words
      operations:
      - name: listwords
        method: GET
        description: List personal dictionary words
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: username
          in: query
          type: string
          required: true
        - name: apiKey
          in: query
          type: string
          required: true
        - name: dicts
          in: query
          type: string
          description: Comma-separated list of dictionary names.
        - name: offset
          in: query
          type: integer
        - name: limit
          in: query
          type: integer
    - name: words-add
      path: /words/add
      operations:
      - name: addword
        method: POST
        description: Add a word to a personal dictionary
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: words-delete
      path: /words/delete
      operations:
      - name: deleteword
        method: POST
        description: Delete a word from a personal dictionary
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: rest
    namespace: languagetool-rest
    port: 8080
    description: REST adapter for LanguageTool HTTP API. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/check
      name: check
      description: REST surface for check.
      operations:
      - method: POST
        name: checktext
        description: Check text for grammar and style issues
        call: languagetool.checktext
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/languages
      name: languages
      description: REST surface for languages.
      operations:
      - method: GET
        name: listlanguages
        description: List supported languages
        call: languagetool.listlanguages
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/words
      name: words
      description: REST surface for words.
      operations:
      - method: GET
        name: listwords
        description: List personal dictionary words
        call: languagetool.listwords
        with:
          username: rest.username
          apiKey: rest.apiKey
          dicts: rest.dicts
          offset: rest.offset
          limit: rest.limit
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/words/add
      name: words-add
      description: REST surface for words-add.
      operations:
      - method: POST
        name: addword
        description: Add a word to a personal dictionary
        call: languagetool.addword
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/words/delete
      name: words-delete
      description: REST surface for words-delete.
      operations:
      - method: POST
        name: deleteword
        description: Delete a word from a personal dictionary
        call: languagetool.deleteword
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: languagetool-mcp
    port: 9090
    transport: http
    description: MCP adapter for LanguageTool HTTP API. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: check-text-grammar-and-style
      description: Check text for grammar and style issues
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: languagetool.checktext
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: list-supported-languages
      description: List supported languages
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: languagetool.listlanguages
      outputParameters:
      - type: object
        mapping: $.
    - name: list-personal-dictionary-words
      description: List personal dictionary words
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: languagetool.listwords
      with:
        username: tools.username
        apiKey: tools.apiKey
        dicts: tools.dicts
        offset: tools.offset
        limit: tools.limit
      outputParameters:
      - type: object
        mapping: $.
    - name: add-word-personal-dictionary
      description: Add a word to a personal dictionary
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: languagetool.addword
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-word-personal-dictionary
      description: Delete a word from a personal dictionary
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: languagetool.deleteword
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
